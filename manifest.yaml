manifestVersion: 1
name: "@stateless/proxmox"
version: "2026.06.01.2"
description: >-
  Transport-neutral Proxmox VE guest lifecycle — clone, configure (cloud-init),
  resize disk, start, stop, delete, lookup, sync, and in-guest exec — over the
  REST API directly (token auth) or by running pvesh on the node over SSH
  (node-local API, reuses an existing jump). Idempotent clone/delete + a
  reachability pre-flight check.
repository: "https://github.com/stateless/swamp-proxmox"
# Flat repo layout: typed keys + additionalFiles resolve relative to this
# manifest's own directory (the repo root), not a swamp typedDir.
paths:
  base: manifest
labels:
  - proxmox
  - virtualization
  - infrastructure
  - lifecycle
models:
  - proxmox_guest.ts
additionalFiles:
  - README.md
  - LICENSE.txt
